<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Design your taco</title>
    <link rel="stylesheet" th:href="@{/styles.css}">
</head>
<body>
<div class="page wide">
    <h1>Design your taco!</h1>
    <div class="student">2022810001 강명묵</div>

    <h2>
        Feelin' hungry,
        <span th:text="${user != null ? user.fullname : 'user'}">user</span>
    </h2>

    <div class="logo-text">🌮 Taco Cloud</div>

    <form method="post" th:action="@{/design}" th:object="${taco}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <div class="error" th:if="${#fields.hasErrors('ingredients')}" th:errors="*{ingredients}"></div>

        <div class="ingredient-grid">
            <div class="ingredient-group">
                <h3>Designate your wrap:</h3>
                <div th:each="ingredient : ${wrap}">
                    <input type="checkbox" th:field="*{ingredients}" th:value="${ingredient.id}">
                    <span th:text="${ingredient.name}">INGREDIENT</span>
                </div>
            </div>

            <div class="ingredient-group">
                <h3>Pick your protein:</h3>
                <div th:each="ingredient : ${protein}">
                    <input type="checkbox" th:field="*{ingredients}" th:value="${ingredient.id}">
                    <span th:text="${ingredient.name}">INGREDIENT</span>
                </div>
            </div>

            <div class="ingredient-group">
                <h3>Choose your cheese:</h3>
                <div th:each="ingredient : ${cheese}">
                    <input type="checkbox" th:field="*{ingredients}" th:value="${ingredient.id}">
                    <span th:text="${ingredient.name}">INGREDIENT</span>
                </div>
            </div>

            <div class="ingredient-group">
                <h3>Determine your veggies:</h3>
                <div th:each="ingredient : ${veggies}">
                    <input type="checkbox" th:field="*{ingredients}" th:value="${ingredient.id}">
                    <span th:text="${ingredient.name}">INGREDIENT</span>
                </div>
            </div>

            <div class="ingredient-group">
                <h3>Select your sauce:</h3>
                <div th:each="ingredient : ${sauce}">
                    <input type="checkbox" th:field="*{ingredients}" th:value="${ingredient.id}">
                    <span th:text="${ingredient.name}">INGREDIENT</span>
                </div>
            </div>
        </div>

        <div class="name-box">
            <h3>Name your taco creation:</h3>
            <input type="text" th:field="*{name}">
            <span class="error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></span>
        </div>

        <input type="submit" value="Submit Taco">
    </form>

    <form method="post" th:action="@{/logout}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <input type="submit" value="Logout">
    </form>
</div>
</body>
</html>
